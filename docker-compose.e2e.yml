services:
  mysql-test:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: ecommerce_test
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    volumes:
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--protocol=TCP", "-u", "app", "--password=secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      DB_HOST: mysql-test
      DB_PORT: 3306
      DB_USER: app
      DB_PASSWORD: secret
      DB_NAME: ecommerce_test
    depends_on:
      mysql-test:
        condition: service_healthy
